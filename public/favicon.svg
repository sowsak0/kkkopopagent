<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>

  <!-- Province map pin shape (One Province) -->
  <path d="M32 10 C23 10 16 17 16 26 C16 36 32 54 32 54 C32 54 48 36 48 26 C48 17 41 10 32 10 Z"
        fill="white" opacity="0.95"/>

  <!-- Data node inside pin (One Data) - three connected dots -->
  <!-- Center dot -->
  <circle cx="32" cy="26" r="4" fill="url(#bg)"/>
  <!-- Top-left dot -->
  <circle cx="25" cy="21" r="2.5" fill="url(#bg)"/>
  <!-- Top-right dot -->
  <circle cx="39" cy="21" r="2.5" fill="url(#bg)"/>
  <!-- Lines connecting dots -->
  <line x1="27.2" y1="22.2" x2="29.5" y2="24" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36.8" y1="22.2" x2="34.5" y2="24" stroke="#059669" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27.2" y1="21" x2="36.8" y2="21" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
</svg>
