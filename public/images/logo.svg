<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#065f46"/>
    </linearGradient>
    <linearGradient id="arr1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="arr2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#6ee7b7"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <radialGradient id="glow" cx="40%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.18)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="rgba(0,0,0,0.45)"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="30" fill="url(#glow)"/>

  <!-- Diagonal arrows: rotated 45° around center (32,32) -->
  <!-- Top-right arc → going from upper-right to lower-left (gold) -->
  <!-- Arrow 1: top-left to bottom-right curve (rotated 45deg group) -->
  <g transform="rotate(45, 32, 32)">
    <!-- Arc top (gold) shadow -->
    <path d="M8 25 A25 25 0 0 1 56 25" stroke="rgba(0,0,0,0.3)" stroke-width="3" fill="none" stroke-linecap="round" transform="translate(0.5,1.5)"/>
    <!-- Arc top (gold) main -->
    <path d="M8 25 A25 25 0 0 1 56 25" stroke="url(#arr1)" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#sh)"/>
    <!-- Arrowhead at START (left, x=8) pointing rightward → clockwise after 45° rotation -->
    <polygon points="8,18 2,27 14,27" fill="#d97706" filter="url(#sh)"/>
    <polygon points="8,19 3,26 13,26" fill="#fde68a"/>

    <!-- Arc bottom (green) shadow -->
    <path d="M56 39 A25 25 0 0 1 8 39" stroke="rgba(0,0,0,0.3)" stroke-width="3" fill="none" stroke-linecap="round" transform="translate(-0.5,1.5)"/>
    <!-- Arc bottom (green) main -->
    <path d="M56 39 A25 25 0 0 1 8 39" stroke="url(#arr2)" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#sh)"/>
    <!-- Arrowhead at START (right, x=56) pointing leftward → clockwise after 45° rotation -->
    <polygon points="56,46 62,37 50,37" fill="#047857" filter="url(#sh)"/>
    <polygon points="56,45 61,38 51,38" fill="#6ee7b7"/>
  </g>

  <!-- Letter A -->
  <text x="32.5" y="40" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="32" font-weight="900" fill="rgba(0,0,0,0.35)">A</text>
  <text x="32" y="39.5" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="32" font-weight="900" fill="white">A</text>
</svg>
